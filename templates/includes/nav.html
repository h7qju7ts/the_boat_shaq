<!-- ===== MAIN NAVIGATION ===== -->
<nav class="main-nav">

  <!-- ===== SITE LOGO / HOME LINK ===== -->
  <a href="{% url 'boats:home' %}" class="logo">
    The Boat Shaq
  </a>

  <!-- ===== NAVIGATION LINKS CONTAINER ===== -->
  <div class="nav-links">

    <!-- ===== USER GREETING (AUTHENTICATED USERS) ===== -->
    {% if user.is_authenticated %}
      <span class="nav-greeting">
        Hi, <strong>{{ user.username }}</strong>
      </span>
    {% endif %}

    <!-- ===== PRIMARY NAVIGATION LINKS ===== -->
    <a href="{% url 'boats:home' %}" class="btn btn-ghost">Home</a>
    <a href="{% url 'boats:catalog' %}" class="btn btn-ghost">Catalog</a>

    <!-- ===== AUTHENTICATED USER LINKS ===== -->
    {% if user.is_authenticated %}

      <!-- ===== BASKET ===== -->
      <a href="{% url 'basket:basket' %}" class="btn btn-ghost">
        Basket
      </a>

      <!-- ===== USER PROFILE ===== -->
      <a href="{% url 'profiles:profile' %}" class="btn btn-ghost">
        My Profile
      </a>

      <!-- ===== LOGOUT ===== -->
      <a href="{% url 'account_logout' %}" class="btn btn-ghost">
        Logout
      </a>

    <!-- ===== GUEST USER LINKS ===== -->
    {% else %}

      <!-- ===== LOGIN ===== -->
      <a href="{% url 'account_login' %}" class="btn btn-ghost">
        Login
      </a>

      <!-- ===== SIGN UP ===== -->
      <a href="{% url 'account_signup' %}" class="btn btn-ghost">
        Sign up
      </a>

    {% endif %}

  </div>

</nav>
