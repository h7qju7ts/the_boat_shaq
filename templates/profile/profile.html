{% extends "main/main.html" %}

<!-- ===== PAGE TITLE ===== -->
{% block title %} Your Profile | The Boat Shaq {% endblock %}

<!-- ===== MAIN CONTENT ===== -->
{% block content %}

<!-- ===== PROFILE PAGE CONTAINER ===== -->
<div class="container">

    <!-- ===== CENTERED PROFILE LAYOUT ===== -->
    <div class="row justify-content-center text-center">
        <div class="col-md-6">

            <!-- ===== PAGE HEADING ===== -->
            <h2>Your Profile</h2>

            <!-- ===== USER INFORMATION ===== -->
            <p>
                <strong>Username:</strong> {{ user.username }}
            </p>

            <p>
                <strong>Email:</strong> {{ user.email|default:"not set" }}
            </p>

            <!-- ===== CHANGE PASSWORD BUTTON ===== -->
            <p>
                <a class="btn btn-secondary" href="{% url 'account_change_password' %}">
                    Change Password
                </a>
            </p>

            <!-- ===== LOG OUT BUTTON ===== -->
            <p>
                <a class="btn btn-secondary" href="{% url 'account_logout' %}">
                    Log out
                </a>
            </p>

        </div>
    </div>

</div>

{% endblock %}
