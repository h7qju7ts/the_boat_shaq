{% extends "main/main.html" %}

<!-- ===== MAIN CONTENT ===== -->
{% block content %}

<!-- ===== CHANGE PASSWORD PAGE CONTAINER ===== -->
<div class="container">

  <!-- ===== CENTERED FORM LAYOUT ===== -->
  <div class="row justify-content-center text-center">
    <div class="col-md-6">

      <!-- ===== PAGE HEADING ===== -->
      <h2>Change Password</h2>

      <!-- ===== CHANGE PASSWORD FORM ===== -->
      <form method="post" action="{% url 'account_change_password' %}">
        {% csrf_token %}

        <!-- ===== CURRENT PASSWORD FIELD ===== -->
        <div class="mb-3 text-start">
          <label for="id_oldpassword" class="form-label">Current password</label>

          <!-- ===== PASSWORD INPUT WITH VISIBILITY TOGGLE ===== -->
          <div class="password-wrapper">
            {{ form.oldpassword }}
            <button type="button" class="toggle-password" data-target="id_oldpassword">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- ===== NEW PASSWORD FIELD ===== -->
        <div class="mb-3 text-start">
          <label for="id_password1" class="form-label">New password</label>

          <!-- ===== PASSWORD INPUT WITH VISIBILITY TOGGLE ===== -->
          <div class="password-wrapper">
            {{ form.password1 }}
            <button type="button" class="toggle-password" data-target="id_password1">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- ===== CONFIRM NEW PASSWORD FIELD ===== -->
        <div class="mb-3 text-start">
          <label for="id_password2" class="form-label">Confirm new password</label>

          <!-- ===== PASSWORD INPUT WITH VISIBILITY TOGGLE ===== -->
          <div class="password-wrapper">
            {{ form.password2 }}
            <button type="button" class="toggle-password" data-target="id_password2">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- ===== UPDATE PASSWORD BUTTON ===== -->
        <p>
          <button type="submit" class="btn btn-secondary">
            Update Password
          </button>
        </p>

      </form>

      <!-- ===== BACK TO PROFILE LINK ===== -->
      <p>
        <a class="link-action" href="{% url 'boats:profile' %}">
          Back to profile
        </a>
      </p>

    </div>
  </div>

</div>

{% endblock %}
